<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hospital Login - MediCare</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css?v=11">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="app-container">
        <header>
            <h1>Hospital Portal</h1>
            <p>Login to view your hospital's complaints</p>
            <nav style="margin-top: 15px; display: flex; gap: 15px; justify-content: center;">
                <a href="/" class="badge medium" style="text-decoration: none;">Public Form</a>
                <a href="/admin" class="badge medium" style="text-decoration: none;">Admin Dashboard</a>
            </nav>
        </header>

        <main>
            <section class="form-section panel" style="max-width: 420px; margin: 0 auto;">
                <h2 style="text-align:center; margin-bottom: 1.8rem;">
                    <i class="fa fa-hospital-o" style="margin-right: 8px; font-size: 1.4rem;"></i>
                    Hospital Login
                </h2>

                <form id="login-form">
                    <div class="form-group">
                        <label for="username">Username</label>
                        <input type="text" id="username" placeholder="Enter your username" required autocomplete="username">
                    </div>
                    <div class="form-group">
                        <label for="password">Password</label>
                        <input type="password" id="password" placeholder="Enter your password" required autocomplete="current-password">
                    </div>
                    <button type="submit" id="login-btn">
                        <i class="fa fa-sign-in" style="margin-right: 6px;"></i> Login
                    </button>
                    <p id="login-error" style="color: #f87171; margin-top: 12px; display: none; text-align: center; font-size: 0.9rem;"></p>
                </form>
            </section>
        </main>
    </div>
    <div id="toast"></div>
    <script src="/static/login.js"></script>
</body>
</html>
