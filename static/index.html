<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hospital Complaint Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="app-container">
        <header>
            <h1>MediCare Complaint System</h1>
            <p>AI-Powered Triage & Resolution</p>
        </header>
        
        <main>
            <section class="form-section panel">
                <h2>Submit Complaint</h2>
                <form id="complaint-form">
                    <div class="form-group">
                        <label for="image_caption">Image Caption</label>
                        <input type="text" id="image_caption" placeholder="e.g. Broken MRI scanner panel" required>
                    </div>
                    <div class="form-group">
                        <label for="voice_text">Voice Text (Transcript)</label>
                        <textarea id="voice_text" rows="3" placeholder="e.g. The MRI scanner in room 3 is making a loud noise and stopped working." required></textarea>
                    </div>
                    <div class="form-group">
                        <label for="hospital_name">Hospital Name</label>
                        <input type="text" id="hospital_name" value="General Hospital" required>
                    </div>
                    <div class="form-group">
                        <label for="city">City</label>
                        <input type="text" id="city" value="Metropolis" required>
                    </div>
                    <button type="submit" id="submit-btn">Process Complaint</button>
                </form>
            </section>

            <section class="dashboard-section panel">
                <div class="dashboard-header">
                    <h2>Live Complaints</h2>
                    <div class="filters">
                        <button class="filter-btn active" id="filter-all">All</button>
                        <button class="filter-btn" id="filter-urgent">Urgent</button>
                    </div>
                </div>
                <div class="complaint-list" id="complaint-list">
                    <!-- Complaints will be injected here via JS -->
                </div>
            </section>
        </main>
    </div>
    <script src="/static/app.js"></script>
</body>
</html>
